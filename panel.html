<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: monospace;
            margin: 0;
            color: #333;
            background: #fff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .status-lbl {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-family: monospace;
            font-size: 11px;
        }

        .s2xx {
            background: #10b981;
        }

        .s3xx {
            background: #3b82f6;
        }

        .s4xx {
            background: #f59e0b;
        }

        .s5xx {
            background: #ef4444;
        }

        /* Left Sidebar */
        #sidebar {
            width: 35%;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            min-width: 15%;
        }

        #header {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            background: #fff;
        }

        #filter {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            font-family: monospace;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        #filter:focus {
            border-color: #0066cc;
        }

        #request-list {
            flex: 1;
            overflow-y: auto;
        }

        .request-item {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            word-break: break-all;
            font-size: 12px;
        }

        .request-item:hover {
            background: #eef2f5;
        }

        .request-item.selected {
            background: #dceaf7;
            border-left: 4px solid #0066cc;
            padding-left: 6px;
        }

        .method {
            font-weight: bold;
            color: #0066cc;
            margin-right: 8px;
            display: inline-block;
            width: 45px;
        }

        /* Draggable Resizer */
        #resizer {
            width: 4px;
            background: #ddd;
            cursor: col-resize;
            z-index: 10;
            transition: background 0.2s;
        }

        #resizer:hover,
        #resizer.active {
            background: #0066cc;
        }

        /* Right Pane */
        #details {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            display: none;
            min-width: 20%;
            overflow: hidden;
        }

        #empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }

        /* Tabs */
        #tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            background: #f4f4f4;
        }

        .tab-btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-family: monospace;
            font-size: 14px;
            color: #555;
        }

        .tab-btn:hover {
            background: #eaeaea;
        }

        .tab-btn.active {
            background: #fff;
            border-bottom: 2px solid #0066cc;
            color: #000;
            font-weight: bold;
        }

        /* Tab Content */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: none;
            font-size: 13px;
        }

        .tab-content.active {
            display: block;
        }

        /* Code blocks & Syntax Highlighting (VS Code Light Theme) */
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 0;
            font-family: Consolas, "Courier New", monospace;
            line-height: 1.4;
        }

        .hl-keyword {
            color: #0000ff;
        }

        .hl-string {
            color: #a31515;
        }

        .hl-number {
            color: #098658;
        }

        .hl-function {
            color: #795e26;
        }

        .hl-object {
            color: #267f99;
        }

        .hl-boolean {
            color: #0000ff;
        }

        .hl-key {
            color: #0451a5;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        button.action-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }

        button.action-btn:hover {
            background: #0052a3;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .status-200 {
            background: #10b981;
        }

        .status-400 {
            background: #f59e0b;
        }

        .status-500 {
            background: #ef4444;
        }

        .hidden {
            display: none !important;
        }

        .toast {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div id="header">
            <input type="text" id="filter" placeholder="Filter URL or Method..." autocomplete="off" />
        </div>
        <div id="request-list">
            <div style="padding: 10px; color: #888;">Waiting for network requests...</div>
        </div>
    </div>

    <!-- Draggable Resizer -->
    <div id="resizer"></div>

    <div id="empty-state">Select a request to view details</div>

    <div id="details">
        <div id="tabs">
            <button class="tab-btn active" data-target="tab-req">Request (Code)</button>
            <button class="tab-btn" data-target="tab-res">Response</button>
        </div>

        <div id="tab-req" class="tab-content active">
            <div class="action-bar">
                <span>Editable Fetch Code</span>
                <button id="copy-btn" class="action-btn">Copy to Clipboard</button>
            </div>
            <pre><code id="code-block"></code></pre>
        </div>

        <div id="tab-res" class="tab-content">
            <span id="res-status" class="status-badge status-200">200 OK</span>
            <h4>Headers</h4>
            <pre><code id="res-headers"></code></pre>
            <h4>Body</h4>
            <pre><code id="res-body">Loading...</code></pre>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script src="panel.js"></script>
</body>

</html>
